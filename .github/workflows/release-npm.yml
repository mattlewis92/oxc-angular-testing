name: Release npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-latest, target: aarch64-apple-darwin }
          - { runner: macos-latest, target: x86_64-apple-darwin }
          - { runner: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { runner: ubuntu-latest, target: aarch64-unknown-linux-gnu, cross: true }
          - { runner: ubuntu-latest, target: x86_64-unknown-linux-musl, cross: true }
          - { runner: windows-latest, target: x86_64-pc-windows-msvc }
          - { runner: windows-latest, target: aarch64-pc-windows-msvc }
          - { runner: ubuntu-latest, target: wasm32-wasip1-threads }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build (${{ matrix.target }})
        working-directory: crates/ng-transform-napi
        run: >-
          pnpm exec napi build --platform --release
          --target ${{ matrix.target }}
          ${{ matrix.cross && '--use-napi-cross' || '' }}
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: |
            crates/ng-transform-napi/*.node
            crates/ng-transform-napi/*.wasm
          if-no-files-found: error

  publish:
    name: Publish to npm (OIDC)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing requires npm >= 11.5.1.
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Move binaries into the binding package
        working-directory: crates/ng-transform-napi
        run: pnpm exec napi artifacts --output-dir ../../artifacts --npm-dir npm
      - name: Create platform npm dirs / update optionalDependencies
        working-directory: crates/ng-transform-napi
        run: pnpm exec napi prepublish -t npm --skip-gh-release
      # Platform binary packages (@oxc-angular-testing/binding-*) + main package.
      - name: Publish binding platform packages
        working-directory: crates/ng-transform-napi
        run: |
          for dir in npm/*/; do
            npm publish "$dir" --access public --provenance || true
          done
      - name: Publish @oxc-angular-testing/transform
        working-directory: crates/ng-transform-napi
        run: npm publish --access public --provenance
      - name: Publish @oxc-angular-testing/jest
        working-directory: packages/jest
        run: npm publish --access public --provenance
      - name: Publish @oxc-angular-testing/vitest
        working-directory: packages/vitest
        run: npm publish --access public --provenance
