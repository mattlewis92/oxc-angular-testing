name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  node:
    name: Node (build binding + plugin tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install
      - name: Build (native binding + TypeScript packages)
        run: pnpm build
      - name: Typecheck
        run: pnpm typecheck
      - name: Test binding
        run: pnpm --filter @oxc-angular-testing/transform test
      - name: Test vitest plugin
        run: pnpm --filter @oxc-angular-testing/vitest test
      - name: Test jest plugin
        run: pnpm --filter @oxc-angular-testing/jest test
