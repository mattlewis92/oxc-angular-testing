name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  node:
    name: Node (build binding + plugin tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install
      - name: Build (native binding + TypeScript packages)
        run: pnpm build
      - name: Typecheck
        run: pnpm typecheck
      - name: Test binding
        run: pnpm --filter @oxc-angular-testing/transform test
      - name: Test vitest plugin
        run: pnpm --filter @oxc-angular-testing/vitest test
      - name: Test jest plugin
        run: pnpm --filter @oxc-angular-testing/jest test

  # Single required status check for branch protection. Runs even when a
  # dependency fails or the run is cancelled (`if: always()`), and fails unless
  # both jobs succeeded — so a cancelled run or a failed/skipped job blocks the
  # merge instead of silently passing. (`cancelled()` is only valid in an `if:`,
  # not inside a `run:` expression.)
  ci-success:
    name: CI succeeded
    if: ${{ always() }}
    needs: [rust, node]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if the run was cancelled
        if: ${{ cancelled() }}
        run: |
          echo "::error::CI run was cancelled."
          exit 1
      - name: Verify rust + node succeeded
        run: |
          echo "rust=${{ needs.rust.result }} node=${{ needs.node.result }}"
          if [ "${{ needs.rust.result }}" != "success" ] || [ "${{ needs.node.result }}" != "success" ]; then
            echo "::error::CI failed — a job did not succeed."
            exit 1
          fi
          echo "All CI jobs passed."
