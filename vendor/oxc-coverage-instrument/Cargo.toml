# VENDORED — see ../VENDORED.md. Sourced from fallow-rs/oxc-coverage-instrument
# tag v0.7.6 (commit 8faba6df9f994c911401ad394b50351b8ca7f943),
# crates/oxc-coverage-instrument. This manifest is made self-contained (literal
# package fields, crates.io sibling deps, benches/dev-deps trimmed) so the crate
# builds standalone as a [patch.crates-io] target outside its original workspace.
[package]
name = "oxc_coverage_instrument"
version = "0.7.6"
edition = "2024"
rust-version = "1.92"
description = "Istanbul-compatible JavaScript/TypeScript coverage instrumentation using the Oxc AST (vendored)"
license = "MIT"
repository = "https://github.com/fallow-rs/oxc-coverage-instrument"
publish = false

[dependencies]
# Sibling suite crates: vendored copy resolves these from crates.io (the
# original used workspace path deps). Versions match the v0.7.6 manifest.
oxc_coverage_types = "0.2.0"
oxc_coverage_source_maps = "0.3.1"
oxc_coverage_v8 = "0.2.0"
oxc_allocator = "0.126"
oxc_ast = "0.126"
oxc_codegen = "0.126"
oxc_parser = "0.126"
oxc_semantic = "0.126"
oxc_sourcemap = "6.1"
oxc_span = "0.126"
oxc_syntax = "0.126"
oxc_transformer = "0.126"
oxc_traverse = "0.126"
serde_json = "1"
sha2 = "0.11"
srcmap-remapping = "=0.3.7"
srcmap-sourcemap = "=0.3.7"
